# =============================================================================
# aurochs-recall — test workflow
#
# Test matrix: ubuntu / windows / macOS × Python 3.13 (T0 only).
#
# TODO: SHA-pin actions.
# We use major-version pins (e.g. `actions/checkout@v4`) for now to keep
# scaffolding readable. Before promoting this workflow out of T0, swap each
# pin for the exact commit SHA — see
# https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-third-party-actions
# =============================================================================

name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.13"]
        # NOTE: a sqlite-version axis (system Python sqlite × pysqlite3-binary
        # fallback) is on the v5 plan but deferred to Agent 1 — they own the
        # sqlite-version-detection code path. Add the matrix dimension here once
        # the fallback path is wired.

    steps:
      - name: Checkout
        # TODO: SHA-pin
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python ${{ matrix.python-version }}
        # TODO: SHA-pin
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: Show toolchain
        run: |
          python --version
          pip --version
          python -c "import sqlite3; print('sqlite3', sqlite3.sqlite_version)"

      - name: Install (editable + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format --check)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy core cli
        continue-on-error: true
        # T0: mypy may surface gaps as the agents fill in implementations.
        # Promote to required once core/ + cli/ pass cleanly.

      - name: Tests (pytest)
        run: pytest -ra

      - name: PII / secrets self-scan
        # Re-run the pre-commit scanners across the whole repo on every push
        # as a final safety net. (Pre-commit catches developer commits;
        # this catches anything that slipped through --no-verify.)
        if: runner.os != 'Windows'
        run: |
          git ls-files | xargs -d '\n' -I{} sh -c '
            if [ -f "$1" ]; then
              python .githooks/_scan_engine.py --label PII --rules .githooks/pii-rules-generic.txt < /dev/null > /dev/null 2>&1 || true
            fi
          ' _ {}
        continue-on-error: true
        # The scanner is built around `git diff --cached`; this CI step is a
        # placeholder until we add a `--all-files` flag to _scan_engine.py.
        # Tracked in TODO.

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build mkdocs (strict)
        run: mkdocs build --strict
